name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Typecheck and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build production app
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: devdash-production-build
          path: |
            dist
            server.js
            package.json
            package-lock.json
            README.md
            docs
          if-no-files-found: error
